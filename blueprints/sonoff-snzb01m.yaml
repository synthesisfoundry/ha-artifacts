blueprint:
  name: Sonoff SNZB-01M 4-Way Button (MQTT action)
  description: >
    Maps all 16 gestures of a Sonoff SNZB-01M (4 buttons x single/double/triple/long)
    to action sequences, triggered directly off the Zigbee2MQTT `action` MQTT topic.

    Durable by design: triggers on the raw MQTT topic, so it does NOT depend on the
    Z2M "legacy action sensor" setting, does NOT use device-registry plumbing, and
    filters out the empty payload Z2M republishes after each press (no double-fire).

    Setup:
      1. Find your device's action topic in Z2M (device page, or watch the Z2M log).
         It looks like:  zigbee2mqtt/<friendly name>/action
      2. Paste that full topic into "Action MQTT topic" below.
      3. Fill in any gestures you want. Empty gestures are simply ignored.
  domain: automation
  input:
    action_topic:
      name: Action MQTT topic
      description: >
        The full Z2M action topic, e.g.
        zigbee2mqtt/[device-friendly-name]/action
        Must match the device's friendly name exactly (spaces and capitalization).
      selector:
        text:

    # ---- Button 1 ----
    b1_single:
      name: Button 1 - single click
      default: []
      selector:
        action:
    b1_double:
      name: Button 1 - double click
      default: []
      selector:
        action:
    b1_triple:
      name: Button 1 - triple click
      default: []
      selector:
        action:
    b1_long:
      name: Button 1 - long press
      default: []
      selector:
        action:

    # ---- Button 2 ----
    b2_single:
      name: Button 2 - single click
      default: []
      selector:
        action:
    b2_double:
      name: Button 2 - double click
      default: []
      selector:
        action:
    b2_triple:
      name: Button 2 - triple click
      default: []
      selector:
        action:
    b2_long:
      name: Button 2 - long press
      default: []
      selector:
        action:

    # ---- Button 3 ----
    b3_single:
      name: Button 3 - single click
      default: []
      selector:
        action:
    b3_double:
      name: Button 3 - double click
      default: []
      selector:
        action:
    b3_triple:
      name: Button 3 - triple click
      default: []
      selector:
        action:
    b3_long:
      name: Button 3 - long press
      default: []
      selector:
        action:

    # ---- Button 4 ----
    b4_single:
      name: Button 4 - single click
      default: []
      selector:
        action:
    b4_double:
      name: Button 4 - double click
      default: []
      selector:
        action:
    b4_triple:
      name: Button 4 - triple click
      default: []
      selector:
        action:
    b4_long:
      name: Button 4 - long press
      default: []
      selector:
        action:

mode: single
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: !input action_topic

# Drop the empty payload Z2M sends to clear the action after each press.
condition:
  - condition: template
    value_template: "{{ trigger.payload not in ['', none] }}"

action:
  - choose:
      # ----- Button 1 -----
      - conditions: "{{ trigger.payload == 'single_button_1' }}"
        sequence: !input b1_single
      - conditions: "{{ trigger.payload == 'double_button_1' }}"
        sequence: !input b1_double
      - conditions: "{{ trigger.payload == 'triple_button_1' }}"
        sequence: !input b1_triple
      - conditions: "{{ trigger.payload == 'long_button_1' }}"
        sequence: !input b1_long

      # ----- Button 2 -----
      - conditions: "{{ trigger.payload == 'single_button_2' }}"
        sequence: !input b2_single
      - conditions: "{{ trigger.payload == 'double_button_2' }}"
        sequence: !input b2_double
      - conditions: "{{ trigger.payload == 'triple_button_2' }}"
        sequence: !input b2_triple
      - conditions: "{{ trigger.payload == 'long_button_2' }}"
        sequence: !input b2_long

      # ----- Button 3 -----
      - conditions: "{{ trigger.payload == 'single_button_3' }}"
        sequence: !input b3_single
      - conditions: "{{ trigger.payload == 'double_button_3' }}"
        sequence: !input b3_double
      - conditions: "{{ trigger.payload == 'triple_button_3' }}"
        sequence: !input b3_triple
      - conditions: "{{ trigger.payload == 'long_button_3' }}"
        sequence: !input b3_long

      # ----- Button 4 -----
      - conditions: "{{ trigger.payload == 'single_button_4' }}"
        sequence: !input b4_single
      - conditions: "{{ trigger.payload == 'double_button_4' }}"
        sequence: !input b4_double
      - conditions: "{{ trigger.payload == 'triple_button_4' }}"
        sequence: !input b4_triple
      - conditions: "{{ trigger.payload == 'long_button_4' }}"
        sequence: !input b4_long
